name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://shine0078.github.io/portfolio

      - name: Verify exported links and assets
        run: npm run check:export

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lighthouse
        run: |
          npm run prepare:lighthouse
          npx --yes @lhci/cli@0.15.x autorun
